<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Регистрация · Зерокодер</title>
  <base target="_parent">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      min-height: 0 !important; height: auto !important;
      font-family: 'Manrope', system-ui, sans-serif;
      color: #1F2937;
      background: #ffffff;
      -webkit-font-smoothing: antialiased;
    }
    body { padding: 16px 14px; }
    body *, body *::before, body *::after { min-height: 0 !important; max-width: 100% !important; }
    body button { width: 100% !important; max-width: 100% !important; }
    #wrap { width: 100%; }
  </style>
</head>
<body>
  <div id="wrap">
    <!-- GetCourse widget. Hosted in standalone HTML so location.search + document.referrer
         are populated and the widget can attach real UTM marks to the lead. -->
    <script id="701e1156dc75f774968e1e34c13e0b82032f98a8" src="https://university.zerocoder.ru/pl/lite/widget/script?id=1615888"></script>
  </div>

  <script>
    // ---- Height reporter: tells parent how tall the rendered widget is ----
    function measure() {
      var bottom = 0;
      var nodes = document.body.querySelectorAll('*');
      for (var i = 0; i < nodes.length; i++) {
        var n = nodes[i];
        var tag = n.tagName;
        if (tag === 'SCRIPT' || tag === 'STYLE' || tag === 'LINK' || tag === 'META') continue;
        var cs = window.getComputedStyle(n);
        if (cs.display === 'none' || cs.visibility === 'hidden') continue;
        var r = n.getBoundingClientRect();
        if (r.height <= 0 || r.width <= 0) continue;
        if (r.bottom > bottom) bottom = r.bottom;
      }
      return Math.ceil(bottom) + 16; // body padding-bottom
    }
    var lastH = 0;
    function tick() {
      var h = measure();
      if (h > 0 && Math.abs(h - lastH) > 2) {
        lastH = h;
        try { parent.postMessage({ type: 'register-modal-h', h: h }, '*'); } catch (e) {}
      }
    }
    setInterval(tick, 200);
    window.addEventListener('load', tick);
    window.addEventListener('resize', tick);

    // ---- UTM backup: copy values from location.search into hidden form inputs
    //      whose name matches the utm key. Widget should already pick them up
    //      from URL, but this is belt-and-braces for safety. ----
    function applyUtmToHiddenInputs() {
      try {
        var params = new URLSearchParams(window.location.search);
        var utm = {};
        ['utm_source','utm_medium','utm_campaign','utm_term','utm_content',
         'gclid','yclid','fbclid','roistat','from','ref'].forEach(function (k) {
          var v = params.get(k);
          if (v) utm[k] = v;
        });
        if (!Object.keys(utm).length) return;
        document.querySelectorAll('input[name], select[name], textarea[name]').forEach(function (el) {
          var name = (el.getAttribute('name') || '').toLowerCase();
          if (utm[name] && !el.value) el.value = utm[name];
        });
      } catch (e) {}
    }
    var utmTick = setInterval(applyUtmToHiddenInputs, 500);
    setTimeout(function () { clearInterval(utmTick); }, 15000);
  </script>
</body>
</html>
